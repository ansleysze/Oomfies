<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan Counter</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>🏆 Fan Leaderboard</h1>

    <!-- Weekly Growth Line Chart -->
    <div class="card chart-card">
        <h2 class="chart-title">Weekly Fan Growth</h2>
        <div class="loading" id="line-loading">
            <div class="spinner"></div>
            <p>Loading chart...</p>
        </div>
        <canvas id="line-chart" style="display:none;"></canvas>
    </div>

    <!-- Total Fan Count Bar Chart -->
    <div class="card chart-card">
        <h2 class="chart-title">Total Fan Count</h2>
        <div class="loading" id="bar-loading">
            <div class="spinner"></div>
            <p>Loading chart...</p>
        </div>
        <canvas id="bar-chart" style="display:none;"></canvas>
    </div>

    <div id="leaderboard"></div>

    <div class="empty" id="empty-state" style="display:none;">
        <p>No fans tracked yet</p>
        <span>Check back soon!</span>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
